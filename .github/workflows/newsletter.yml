name: The Bell — Weekly Newsletter

on:
  schedule:
    # Every Monday 1:00 AM Malaysia time (= Sunday 17:00 UTC)
    - cron: "0 17 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — runs everything but does NOT send the email'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # needed to commit children_topics_log.json back to repo

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install groq python-dotenv gspread google-auth \
                      requests tavily-python feedparser

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS=${{ secrets.RECIPIENT_EMAILS }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          RSS_FEEDS=https://feeds.marketwatch.com/marketwatch/topstories/,https://www.cnbc.com/id/10000664/device/rss/rss.html
          EOF

      - name: Create credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Create log directory
        run: mkdir -p .tmp/logs

      - name: Run newsletter pipeline
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            bash run_newsletter.sh --dry-run
          else
            bash run_newsletter.sh
          fi

      - name: Commit state changes back to repo
        # Files committed every run:
        # 1. children_topics_log.json  — week counter + topic history
        # 2. children_block_state.json — current block's 5 products (regenerated every 5 weeks)
        # 3. curriculum.json           — Section 1 week counter
        # 4. saas_progress.json        — SaaS week counter
        # 5. docs/current_brief.html   — this week's brief (accessible via htmlpreview URL)
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add config/children_topics_log.json config/children_block_state.json config/curriculum.json config/saas_progress.json docs/current_brief.html
          git diff --staged --quiet || git commit -m "chore: advance week state [skip ci]"
          git push
